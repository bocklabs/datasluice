name: OpenCodeReview PR Review

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-review:
    name: AI code review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Run OpenCodeReview
        uses: alibaba/open-code-review@f58b0f2924fecbe1e4361d048b9be4d32d9269ff # v1.7.10
        with:
          llm_url: ${{ secrets.OCR_LLM_URL }}
          llm_auth_token: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          llm_model: ${{ secrets.OCR_LLM_MODEL }}
          llm_use_anthropic: ${{ secrets.OCR_LLM_USE_ANTHROPIC }}
          llm_extra_body: '{"enable_thinking": true}'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          sticky_summary: 'true'
          incremental: 'true'
          upload_artifacts: 'true'
